<!DOCTYPE html>
<html lang="ja-jp">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>リダイレクト中</title>
<style>
  body {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    font-family: sans-serif;
  }
  .loading::after {
    content: "";
    animation: dots 1.5s steps(6) infinite;
  }
  @keyframes dots {
    0%   { content: ""; }
    20%  { content: "."; }
    40%  { content: ".."; }
    60%  { content: "..."; }
    80%  { content: "...."; }
    100% { content: "....."; }
  }
</style>
</head>
<body>
  <h2>読み込み中<span class="loading"></span></h2>
</body>
</html>
